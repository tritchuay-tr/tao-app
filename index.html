<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>เต๋าแห่งวัน · 道德經</title>
<meta name="theme-color" content="#1a1410">
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#f5f0e8;--ink:#1a1410;--gold:#c8a96e;--muted:#7d6d58}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:460px;margin:auto;padding:18px 14px 110px}.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.logo{font-size:28px}.date{font-size:12px;color:var(--muted)}
.cn{font-size:24px;line-height:1.8;text-align:center;padding:14px 0;border-top:1px solid #eee;border-bottom:1px solid #eee}
.title{font-size:20px;font-weight:700;margin:10px 0}.mood{color:var(--gold);font-size:12px;letter-spacing:1px}.poem{white-space:pre-line;background:#faf7f1;padding:14px;border-left:3px solid var(--gold);border-radius:10px;margin:14px 0;line-height:1.8}
.text{line-height:1.9}.reflection{margin-top:14px;padding:14px;background:#f8f2e7;border-radius:12px;color:var(--muted)}
.actions{display:flex;gap:10px;margin-top:16px}.btn{flex:1;border:0;padding:14px;border-radius:12px;font-weight:700}.primary{background:var(--ink);color:#fff}.ghost{background:#eee}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:12px;text-align:center;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><div class="logo">道</div><div class="date" id="date"></div></div>
<div class="card">
<div class="mood" id="mood"></div>
<div class="title" id="title"></div>
<div class="cn" id="cn"></div>
<div class="poem" id="poem"></div>
<div class="text" id="text"></div>
<div class="reflection" id="reflection"></div>
<div class="actions">
<button class="btn ghost" onclick="shareApp()">แชร์</button>
<button class="btn primary" onclick="nextChapter()">บทถัดไป</button>
</div>
</div>
</div>
<div class="nav">เต๋าแห่งวัน · ใช้งานออฟไลน์ได้</div>
<script>
const data=[
{title:'ร่องรอยของเต๋า',mood:'ลึกซึ้ง',cn:'道可道，非常道。名可名，非常名。',poem:'สิ่งที่เรียกได้ว่าจริง
มักไม่ใช่ทั้งหมด',text:'บางสิ่งยิ่งอธิบายยิ่งเลือนหาย ความสุข ความรัก และความหมาย มักปรากฏเมื่อเราเลิกจับมันแน่นเกินไป',reflection:'วันนี้มีอะไรที่คุณพยายามควบคุมมากเกินไปหรือไม่?'},
{title:'ความดีงามของน้ำ',mood:'อ่อนโยน',cn:'上善若水。水善利萬物而不爭。',poem:'น้ำไม่เคยอวดตัว
แต่ทุกชีวิตต้องพึ่งพา',text:'ความอ่อนโยนไม่ใช่ความอ่อนแอ น้ำไม่ชนหินตรงๆ แต่มันเปลี่ยนหินได้เสมอ',reflection:'มีเรื่องใดที่คุณควรใช้ความนุ่มนวลแทนแรงปะทะ?'},
{title:'รู้จักตัวเอง',mood:'ลุ่มลึก',cn:'知人者智，自知者明。',poem:'รู้คนคือปัญญา
รู้ตนคือแสงสว่าง',text:'การมองเห็นตัวเองอย่างซื่อตรง คือพลังที่เงียบแต่ยิ่งใหญ่',reflection:'ตอนนี้หัวใจคุณต้องการอะไรจริงๆ?'}
];
let i=0;
function render(){const x=data[i];id('title').textContent=x.title;id('mood').textContent='— '+x.mood;id('cn').textContent=x.cn;id('poem').textContent=x.poem;id('text').textContent=x.text;id('reflection').textContent=x.reflection}
function id(v){return document.getElementById(v)}
function nextChapter(){i=(i+1)%data.length;render()}
async function shareApp(){const shareData={title:'เต๋าแห่งวัน · 道德經',text:'บทเต๋าประจำวันสำหรับใจที่เหนื่อย',url:location.href};
if(navigator.share){try{await navigator.share(shareData)}catch(e){}}
else{try{await navigator.clipboard.writeText(location.href);alert('คัดลอกลิงก์แล้ว');}catch(e){prompt('คัดลอกลิงก์นี้',location.href)}}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
id('date').textContent=new Date().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});render();
</script>
</body>
</html>
